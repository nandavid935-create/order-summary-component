<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">

  <title>Frontend Mentor | Order summary card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    body {
      background-color: hsl(225, 100%, 94%);
      background-image: url(pattern-background-mobile.svg);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Red Hat Display', sans-serif;
    
      box-sizing: border-box;
      flex-direction: column;
    }

    main {
      width: 340px;
      background-color: #ffffff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0px 20px 40px hsla(245, 75%, 52%, 0.15);
    }

    main > img {
      width: 100%;
      display: block;
    }

    .content {
      padding: 1rem 2.5rem;
      text-align: center;
    }

    .content h1 {
      font-size: 1.250rem;
      font-weight: 900;
      color: hsl(223, 47%, 23%);
      margin-bottom: 1rem;
    }

     .description {
      
    
      color: hsl(224, 23%, 55%);
      line-height: 1.6;
      margin-bottom: 2rem;
      
    }

   
    .price {
      display:flex;
      align-items: center;
      gap: 1rem; 
      margin-bottom: 2rem;
  
    }
   .price img {
       border-radius: 50%;
      width:38px;
      height: 38px;
    }
      



    
    .plan-info {
      flex:1;
      text-align: left;


    }
    .plan-name {
    margin: 0;
    font-size: .85rem;
    font-weight: 900;
    color: hsl(223, 47%, 23%);
}

.plan-cost {
    margin: 4px 0 0;
    color: hsl(224, 23%, 55%);
    font-size:.85rem ;
}

.price a {
  font-size: 0.775rem;
  font-weight: 800;
  color: hsl(245, 75%, 52%);
}


.payment {
  background-color: blue;
  padding: .85rem;
  border-radius: 8px;
  color: white;
  font-weight: 700;
  width:100%;
  border: none;
  

}
.cancel {
  background-color: white;
  color:hsl(224, 23%, 55%) ;
  width: 100%;
  padding:.85rem ;
  font-weight: 800;
  border: none;
}

@media (min-width: 768px) {

  main {
    width: 400px;
  }

  .content {
    padding: 2rem 3rem;
  }
  body {
    background-image:url(pattern-background-desktop.svg) ;
  }

}
@media (hover: hover) {
  .payment:hover {
    background-color: hsl(245, 83%, 68%);
  }

  .cancel:hover {
    color: hsl(223, 47%, 23%);
  }

  .price a:hover {
    color: hsl(245, 83%, 68%);
  }
}
  </style>
</head>
<body>
  <main>
          <img src="illustration-hero.svg "alt ="illustration-hero">
       <div class="content">
           <h1>
           Order Summary
          </h1>


         <p class="description">
             You can now listen to millions of songs, audiobooks, and podcasts on any 
             device anywhere you like!
         </p>
           <div class="price">
             <img src="icon-music.svg" alt="music icon">
             <div class="plan-info">
                  <p class="plan-name"> Annual Plan</p>
                   <p class="plan-cost"> $59.99/year</p>
             </div>

                <a href="#">Change</a>
           </div>

           <button class="payment"> Proceed to Payment</button>
           <button class="cancel">Cancel Order</button>
        </div>
  </main>
          <footer class="attribution">
            Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
             Coded by <a href="#">Hanan Edward</a>.
          </footer>
        
    
    

        
</body>
</html>
